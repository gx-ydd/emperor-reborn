<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Emperor Reborn</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      background: #111827;
      color: #e5e7eb;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
    }

    #status {
      color: #93c5fd;
      margin-bottom: 12px;
      font-size: 14px;
    }

    #messages {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 60vh;
      padding-bottom: 12px;
    }

    .msg {
      padding: 12px 14px;
      border-radius: 12px;
      line-height: 1.55;
      overflow-wrap: anywhere;
    }

    .user {
      background: #1f2937;
      border: 1px solid #374151;
      align-self: flex-end;
      max-width: 78%;
    }

    .assistant {
      background: #172554;
      border: 1px solid #1d4ed8;
      align-self: flex-start;
      max-width: 86%;
    }

    .markdown-body {
      white-space: normal;
    }

    .markdown-body > :first-child {
      margin-top: 0;
    }

    .markdown-body > :last-child {
      margin-bottom: 0;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6 {
      margin: 14px 0 8px;
      line-height: 1.25;
    }

    .markdown-body p {
      margin: 8px 0;
    }

    .markdown-body ul,
    .markdown-body ol {
      margin: 8px 0;
      padding-left: 22px;
    }

    .markdown-body blockquote {
      margin: 10px 0;
      padding: 8px 12px;
      border-left: 4px solid #60a5fa;
      background: rgba(15, 23, 42, 0.45);
      color: #dbeafe;
    }

    .markdown-body a {
      color: #93c5fd;
      text-decoration: underline;
    }

    .markdown-body code {
      padding: 2px 5px;
      border-radius: 5px;
      background: rgba(3, 7, 18, 0.72);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
    }

    .markdown-body pre {
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      overflow-x: auto;
      background: #020617;
      border: 1px solid #334155;
    }

    .markdown-body pre code {
      padding: 0;
      background: transparent;
      border-radius: 0;
      white-space: pre;
    }

    .markdown-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
      display: block;
      overflow-x: auto;
    }

    .markdown-body th,
    .markdown-body td {
      border: 1px solid #334155;
      padding: 6px 8px;
      text-align: left;
    }

    .markdown-body th {
      background: rgba(30, 64, 175, 0.35);
    }

    .markdown-body hr {
      border: 0;
      border-top: 1px solid #334155;
      margin: 14px 0;
    }

    .event {
      font-size: 12px;
      color: #9ca3af;
      border-left: 3px solid #4b5563;
      padding-left: 10px;
      white-space: pre-wrap;
    }

    .error {
      color: #fecaca;
      border-left-color: #ef4444;
    }

    form {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    textarea {
      flex: 1;
      min-height: 72px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #374151;
      background: #030712;
      color: #e5e7eb;
      resize: vertical;
    }

    button {
      width: 110px;
      border: 0;
      border-radius: 10px;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    #send {
      background: #2563eb;
    }

    #stop {
      background: #dc2626;
    }

    button:disabled {
      background: #4b5563 !important;
      cursor: not-allowed;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    .small-btn {
      width: auto;
      padding: 8px 12px;
      background: #374151;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Emperor Reborn</h1>
    <div id="status">连接中...</div>

    <div class="toolbar">
      <button id="reload" class="small-btn" type="button">刷新历史</button>
      <button id="diagnostics" class="small-btn" type="button">诊断</button>
    </div>

    <div id="messages"></div>

    <form id="form">
      <textarea id="input" placeholder="输入消息。例如：列出当前项目里的 Python 文件，并总结作用。"></textarea>
      <button id="send" type="submit">发送</button>
      <button id="stop" type="button" disabled>停止</button>
    </form>
  </main>

  <script>
    const statusEl = document.getElementById('status')
    const messagesEl = document.getElementById('messages')
    const form = document.getElementById('form')
    const input = document.getElementById('input')
    const send = document.getElementById('send')
    const stopBtn = document.getElementById('stop')
    const reloadBtn = document.getElementById('reload')
    const diagnosticsBtn = document.getElementById('diagnostics')

    let ws = null
    let currentAssistantEl = null

    function scrollBottom() {
      window.scrollTo(0, document.body.scrollHeight)
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#96;')
    }

    function renderInlineMarkdown(value) {
      const codeSpans = []
      let text = String(value ?? '').replace(/`([^`\n]+)`/g, (_, code) => {
        const token = `@@CODE_SPAN_${codeSpans.length}@@`
        codeSpans.push(`<code>${escapeHtml(code)}</code>`)
        return token
      })

      text = escapeHtml(text)

      text = text.replace(/\[([^\]]+)]\((https?:\/\/[^\s)]+)\)/g, (_, label, url) => {
        return `<a href="${escapeAttr(url)}" target="_blank" rel="noopener noreferrer">${label}</a>`
      })
      text = text.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
      text = text.replace(/__([^_\n]+)__/g, '<strong>$1</strong>')
      text = text.replace(/(^|[^\*])\*([^*\n]+)\*/g, '$1<em>$2</em>')
      text = text.replace(/(^|[^_])_([^_\n]+)_/g, '$1<em>$2</em>')

      for (const [index, html] of codeSpans.entries()) {
        text = text.replaceAll(`@@CODE_SPAN_${index}@@`, html)
      }

      return text
    }

    function tryRenderTable(lines, startIndex) {
      if (startIndex + 1 >= lines.length) return null

      const headerLine = lines[startIndex]
      const dividerLine = lines[startIndex + 1]
      if (!headerLine.includes('|') || !/^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(dividerLine)) {
        return null
      }

      const splitRow = (line) => line
        .trim()
        .replace(/^\|/, '')
        .replace(/\|$/, '')
        .split('|')
        .map((cell) => cell.trim())

      const headers = splitRow(headerLine)
      const rows = []
      let index = startIndex + 2

      while (index < lines.length && lines[index].includes('|') && lines[index].trim()) {
        const cells = splitRow(lines[index])
        rows.push(cells)
        index += 1
      }

      const thead = `<thead><tr>${headers.map((cell) => `<th>${renderInlineMarkdown(cell)}</th>`).join('')}</tr></thead>`
      const tbody = `<tbody>${rows.map((row) => `<tr>${headers.map((_, cellIndex) => `<td>${renderInlineMarkdown(row[cellIndex] || '')}</td>`).join('')}</tr>`).join('')}</tbody>`

      return {
        html: `<table>${thead}${tbody}</table>`,
        nextIndex: index,
      }
    }

    function renderMarkdown(markdown) {
      const lines = String(markdown ?? '').replace(/\r\n/g, '\n').split('\n')
      const html = []
      const paragraph = []
      let listType = null
      let listItems = []
      let inCodeBlock = false
      let codeFence = ''
      let codeLanguage = ''
      let codeLines = []

      const flushParagraph = () => {
        if (!paragraph.length) return
        html.push(`<p>${renderInlineMarkdown(paragraph.join('\n')).replace(/\n/g, '<br>')}</p>`)
        paragraph.length = 0
      }

      const flushList = () => {
        if (!listType || !listItems.length) return
        html.push(`<${listType}>${listItems.map((item) => `<li>${renderInlineMarkdown(item)}</li>`).join('')}</${listType}>`)
        listType = null
        listItems = []
      }

      const flushCodeBlock = () => {
        const languageClass = codeLanguage ? ` class="language-${escapeAttr(codeLanguage)}"` : ''
        html.push(`<pre><code${languageClass}>${escapeHtml(codeLines.join('\n'))}</code></pre>`)
        inCodeBlock = false
        codeFence = ''
        codeLanguage = ''
        codeLines = []
      }

      for (let index = 0; index < lines.length; index += 1) {
        const line = lines[index]

        if (inCodeBlock) {
          if (line.trim().startsWith(codeFence)) {
            flushCodeBlock()
          } else {
            codeLines.push(line)
          }
          continue
        }

        const fenceMatch = line.match(/^\s*(```|~~~)\s*([\w.+-]*)\s*$/)
        if (fenceMatch) {
          flushParagraph()
          flushList()
          inCodeBlock = true
          codeFence = fenceMatch[1]
          codeLanguage = fenceMatch[2] || ''
          continue
        }

        if (!line.trim()) {
          flushParagraph()
          flushList()
          continue
        }

        const table = tryRenderTable(lines, index)
        if (table) {
          flushParagraph()
          flushList()
          html.push(table.html)
          index = table.nextIndex - 1
          continue
        }

        const headingMatch = line.match(/^(#{1,6})\s+(.+)$/)
        if (headingMatch) {
          flushParagraph()
          flushList()
          const level = headingMatch[1].length
          html.push(`<h${level}>${renderInlineMarkdown(headingMatch[2])}</h${level}>`)
          continue
        }

        if (/^\s*([-*_])\s*\1\s*\1(\s*\1)*\s*$/.test(line)) {
          flushParagraph()
          flushList()
          html.push('<hr>')
          continue
        }

        const quoteMatch = line.match(/^\s*>\s?(.+)$/)
        if (quoteMatch) {
          flushParagraph()
          flushList()
          html.push(`<blockquote>${renderInlineMarkdown(quoteMatch[1])}</blockquote>`)
          continue
        }

        const unorderedMatch = line.match(/^\s*[-*+]\s+(.+)$/)
        if (unorderedMatch) {
          flushParagraph()
          if (listType && listType !== 'ul') flushList()
          listType = 'ul'
          listItems.push(unorderedMatch[1])
          continue
        }

        const orderedMatch = line.match(/^\s*\d+\.\s+(.+)$/)
        if (orderedMatch) {
          flushParagraph()
          if (listType && listType !== 'ol') flushList()
          listType = 'ol'
          listItems.push(orderedMatch[1])
          continue
        }

        flushList()
        paragraph.push(line)
      }

      if (inCodeBlock) {
        flushCodeBlock()
      }

      flushParagraph()
      flushList()

      return html.join('\n') || ''
    }

    function renderMessageContent(el) {
      el.innerHTML = renderMarkdown(el.dataset.raw || '')
    }

    function addMessage(role, content) {
      const el = document.createElement('div')
      el.className = `msg ${role} markdown-body`
      el.dataset.raw = content || ''
      renderMessageContent(el)
      messagesEl.appendChild(el)
      scrollBottom()
      return el
    }

    function appendMessageDelta(el, content) {
      el.dataset.raw = `${el.dataset.raw || ''}${content || ''}`
      renderMessageContent(el)
      scrollBottom()
    }

    function addEvent(content, isError = false) {
      const el = document.createElement('div')
      el.className = isError ? 'event error' : 'event'
      el.textContent = content
      messagesEl.appendChild(el)
      scrollBottom()
      return el
    }

    async function loadBootstrap() {
      const res = await fetch('/api/bootstrap')
      const data = await res.json()

      messagesEl.innerHTML = ''

      for (const row of data.history || []) {
        addMessage(row.role === 'assistant' ? 'assistant' : 'user', row.content)
      }

      const status = data.status || {}
      statusEl.textContent = `状态：${status.busy ? '运行中' : '空闲'} · ${status.provider || ''}/${status.model || ''}`
    }

    async function showDiagnostics() {
      const res = await fetch('/api/diagnostics')
      const data = await res.json()
      addEvent(`诊断：\n${JSON.stringify(data, null, 2)}`)
    }

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss' : 'ws'
      ws = new WebSocket(`${protocol}://${location.host}/ws`)

      ws.onopen = () => {
        statusEl.textContent = '已连接'
      }

      ws.onclose = () => {
        statusEl.textContent = '连接断开，2 秒后重连...'
        setTimeout(connect, 2000)
      }

      ws.onmessage = (message) => {
        const data = JSON.parse(message.data)
        const event = data.event
        const payload = data.payload || {}

        if (event === 'ready') {
          statusEl.textContent = `已连接 · ${payload.provider || ''}/${payload.model || ''}`
        } else if (event === 'user_message') {
          currentAssistantEl = null
        } else if (event === 'assistant_start') {
          currentAssistantEl = addMessage('assistant', '')
          send.disabled = true
          stopBtn.disabled = false
          statusEl.textContent = `生成中 · ${payload.provider || ''}/${payload.model || ''}`
        } else if (event === 'message_delta') {
          if (!currentAssistantEl) {
            currentAssistantEl = addMessage('assistant', '')
          }
          appendMessageDelta(currentAssistantEl, payload.content || '')
        } else if (event === 'tool_call') {
          addEvent(`调用工具：${payload.tool_name}\n参数：${JSON.stringify(payload.args, null, 2)}`)
        } else if (event === 'tool_result') {
          const content = String(payload.content || '')
          addEvent(`工具结果：\n${content.slice(0, 800)}${content.length > 800 ? '\n...[已截断显示]' : ''}`)
        } else if (event === 'runtime_task_cancelled') {
          send.disabled = false
          stopBtn.disabled = true
          currentAssistantEl = null
          statusEl.textContent = '已取消'
          addEvent('当前任务已取消。')
        } else if (event === 'assistant_done') {
          send.disabled = false
          stopBtn.disabled = true
          currentAssistantEl = null
          statusEl.textContent = '空闲'
        } else if (event === 'error') {
          send.disabled = false
          stopBtn.disabled = true
          currentAssistantEl = null
          statusEl.textContent = '错误'
          addEvent(`错误：${payload.message || JSON.stringify(payload)}`, true)
        }
      }
    }

    form.addEventListener('submit', (event) => {
      event.preventDefault()

      const text = input.value.trim()
      if (!text) return

      addMessage('user', text)
      input.value = ''
      send.disabled = true
      stopBtn.disabled = false

      ws.send(JSON.stringify({
        type: 'user_message',
        content: text,
      }))
    })

    stopBtn.addEventListener('click', async () => {
      stopBtn.disabled = true
      await fetch('/api/runtime/stop', { method: 'POST' })
    })

    reloadBtn.addEventListener('click', async () => {
      await loadBootstrap()
    })

    diagnosticsBtn.addEventListener('click', async () => {
      await showDiagnostics()
    })

    loadBootstrap().then(connect)
  </script>
</body>
</html>
